name: Autoformat persistent HTTP branch

on:
  push:
    branches:
      - feature/persistent-http-client

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/persistent-http-client

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format sources
        run: |
          find src tests examples -type f \( -name '*.h' -o -name '*.cpp' -o -name '*.ino' \) -print0 \
            | xargs -0 clang-format -i

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests examples
          git commit -m "Format persistent HTTP implementation"
          git push
