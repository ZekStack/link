name: Cleanup Obsolete Runs

on:
  pull_request:

permissions:
  actions: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded branch runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, branch, per_page: 100 }
            );

            for (const run of runs) {
              if (run.id === context.runId || run.status === 'completed') {
                continue;
              }
              const keepLatestPullRequestCi =
                run.name === 'CI' &&
                run.event === 'pull_request' &&
                run.head_sha === headSha;
              if (keepLatestPullRequestCi) {
                continue;
              }
              try {
                await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                core.info(`Cancelled ${run.name} #${run.run_number} (${run.id})`);
              } catch (error) {
                core.warning(`Could not cancel run ${run.id}: ${error.message}`);
              }
            }
